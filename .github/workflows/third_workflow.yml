name: third Workflow
on: push

jobs:
  run-first-command: 
    runs-on: ubuntu-latest
    steps: 
      - 
        name: List Files and Copy Repo
        run: ls -a
      -
        name: Copy Files
        run: |
          git init
          git remote add origin "https://$GITHUB_ACTOR:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git fetch origin
          git checkout main
        #uses: actions/checkout@v4
      -
        name: List Files 
        run: ls -a