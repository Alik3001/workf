jobs:
  run-first-command: 
    runs-on: ubuntu-latest
    steps: 
      - 
        name: Display some text
        run: node -v
      - 
        name: Command in Multiline
        run: | 
          node -v
          npm -v
  run-parallel-command:
    runs-on: windows-latets
    steps:
      -
        name: Display Node Version on Window
        run: node -v
  run-second-command:
    runs-on: macos-latest
    needs: run-first-command
    steps:
      -
        name: Display 1Node Version on MacOs
        run: node -v

